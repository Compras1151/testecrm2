<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - Painel Principal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="logo-container">
    <img src="logo.jpeg" alt="Logo" class="logo">
</div>

<button id="btnSair" class="btn-sair">🚪 Sair</button>

<div class="container">

    <h1>📊 CRM - Painel Principal</h1>

    <div id="bemVindo"></div>

    <div id="contadorExcluidos"
         style="margin-bottom:15px;font-weight:bold;">
    </div>

    <div class="menu-cards">

        <a href="clientes.html" class="card-acesso">
            <div class="card-acesso-conteudo">
                <h3>📋 Clientes Cadastrados</h3>
                <p>Visualizar todos os clientes cadastrados.</p>
            </div>
        </a>

        <a href="cadastro.html" class="card-acesso">
            <div class="card-acesso-conteudo">
                <h3>👤 Cadastrar Cliente</h3>
                <p>Adicionar clientes manualmente.</p>
            </div>
        </a>

        <a href="excluidos.html" class="card-acesso">
            <div class="card-acesso-conteudo">
                <h3>🗑 Histórico de Exclusão</h3>
                <p>Ver clientes removidos.</p>
            </div>
        </a>

        <a href="usuarios.html"
           id="menuUsuarios"
           class="card-acesso">

            <div class="card-acesso-conteudo">
                <h3>👥 Usuários</h3>
                <p>Gerenciar acessos ao sistema.</p>
            </div>

        </a>

    </div>

</div>

<div id="toast-container"></div>

<script src="index.js"></script>
